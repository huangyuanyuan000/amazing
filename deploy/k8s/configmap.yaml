apiVersion: v1
kind: ConfigMap
metadata:
  name: amazing-config
  namespace: amazing
data:
  DATABASE_TYPE: "postgresql"
  REDIS_URL: "redis://redis-svc:6379/0"
  MINIO_ENDPOINT: "minio-svc:9000"
  API_GATEWAY_PORT: "8000"
  DEPLOY_MODE: "k8s"
  AI_TOOL: "claude"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amazing-db-config
  namespace: amazing
data:
  POSTGRES_DB: "amazing"
  POSTGRES_USER: "amazing"
  # 数据库连接串 - 根据实际环境修改
  # 有数据库: 修改为已有数据库地址
  # 无数据库: 使用下方默认值，K8s 会自动部署 PostgreSQL
  DATABASE_URL: "postgresql+asyncpg://amazing:amazing123@postgres-svc:5432/amazing"
