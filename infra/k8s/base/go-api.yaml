apiVersion: v1
kind: Service
metadata:
  name: go-api
  namespace: amazing
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: go-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-api
  namespace: amazing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-api
  template:
    metadata:
      labels:
        app: go-api
    spec:
      containers:
      - name: go-api
        image: amazing/go-api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: amazing-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
