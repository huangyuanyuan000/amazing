---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: model-platform
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: model-platform
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# MinIO Service
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: model-platform
spec:
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: model-platform
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: model-platform
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
