ironclaw_instance:
  role: backend-dev
  title: "后端开发"
  level: developer
  department: engineering

  permissions:
    read: [docs/, src/backend/, .agents/*/backend/, tests/backend/, config/]
    write: [src/backend/, tests/backend/]
    create: [backend-models, backend-apis, backend-services, migrations]
    execute: [lint:backend, test:backend, migrate, seed]

  restrictions:
    - 不能修改前端代码
    - 不能修改生产部署配置
    - 不能创建/修改角色
    - 不能直接部署到生产环境

  communication:
    can_request_to:
      - architect: [技术方案审批, 数据库变更申请]
      - product-manager: [需求澄清, API 设计确认]
      - frontend-dev: [API 联调, 接口变更通知]
      - test-engineer: [测试用例确认, Bug 复现协助]
      - devops-engineer: [部署申请, 数据库配置]
    can_receive_from:
      - product-manager: [需求变更通知]
      - architect: [技术方案通知, 规范变更]
      - frontend-dev: [API 需求]
      - test-engineer: [Bug 报告, 测试报告]

  handoff_agents:
    - model-generator
    - api-generator
    - service-generator-backend
    - test-generator

  workflows:
    - code-generation: [backend_steps]
    - bug-fix: [fix_backend_bug]
    - code-review: [create_pr, peer_review]
    - testing: [unit_test, integration_test]
