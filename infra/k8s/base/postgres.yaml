apiVersion: v1
kind: Namespace
metadata:
  name: amazing
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amazing-config
  namespace: amazing
data:
  DATABASE_URL: "postgresql://amazing:amazing123@postgres:5432/amazing"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: amazing
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: amazing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "amazing"
        - name: POSTGRES_USER
          value: "amazing"
        - name: POSTGRES_PASSWORD
          value: "amazing123"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: amazing
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
