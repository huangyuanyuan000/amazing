version: '3.8'

services:
  # ==================== 数据库 ====================

  # PostgreSQL - 商品和订单数据库
  postgres:
    image: postgres:15
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/postgres:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL - 支付数据库
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: payment
      MYSQL_USER: payment
      MYSQL_PASSWORD: payment123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db/mysql:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存
  redis:
    image: redis:7
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch - 商品搜索
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ecommerce-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # RabbitMQ - 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ecommerce
      RABBITMQ_DEFAULT_PASS: ecommerce123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== 后端服务 ====================

  # Common Agent - 通用服务
  common-service:
    build: ../../backend/common
    container_name: ecommerce-common
    environment:
      DATABASE_URL: postgresql://ecommerce:ecommerce123@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network
    restart: unless-stopped

  # 商品服务
  product-service:
    build: ../../backend/product
    container_name: ecommerce-product
    environment:
      DATABASE_URL: postgresql://ecommerce:ecommerce123@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      COMMON_SERVICE_URL: http://common-service:8000
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      common-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # 订单服务
  order-service:
    build: ../../backend/order
    container_name: ecommerce-order
    environment:
      DATABASE_URL: postgresql://ecommerce:ecommerce123@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://ecommerce:ecommerce123@rabbitmq:5672
      COMMON_SERVICE_URL: http://common-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      common-service:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # 支付服务
  payment-service:
    build: ../../backend/payment
    container_name: ecommerce-payment
    environment:
      DATABASE_URL: mysql://payment:payment123@mysql:3306/payment
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://ecommerce:ecommerce123@rabbitmq:5672
      COMMON_SERVICE_URL: http://common-service:8000
    ports:
      - "8003:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      common-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # 物流服务
  logistics-service:
    build: ../../backend/logistics
    container_name: ecommerce-logistics
    environment:
      DATABASE_URL: postgresql://ecommerce:ecommerce123@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      COMMON_SERVICE_URL: http://common-service:8000
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      common-service:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ==================== 前端 ====================

  frontend:
    build: ../../frontend
    container_name: ecommerce-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_PRODUCT_API: http://localhost:8001
      REACT_APP_ORDER_API: http://localhost:8002
      REACT_APP_PAYMENT_API: http://localhost:8003
      REACT_APP_LOGISTICS_API: http://localhost:8004
    ports:
      - "3000:3000"
    depends_on:
      - common-service
      - product-service
      - order-service
      - payment-service
      - logistics-service
    networks:
      - ecommerce-network
    restart: unless-stopped

  # ==================== 监控 ====================

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ecommerce-network
    restart: unless-stopped

volumes:
  postgres_data:
  mysql_data:
  redis_data:
  es_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  ecommerce-network:
    driver: bridge
