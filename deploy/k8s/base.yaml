apiVersion: v1
kind: Namespace
metadata:
  name: amazing
  labels:
    app: amazing-platform
---
# ConfigMap - 全局配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: amazing-config
  namespace: amazing
data:
  DATABASE_HOST: "postgres-svc"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "amazing"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  MINIO_ENDPOINT: "minio-svc:9000"
---
# Secret - 敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: amazing-secrets
  namespace: amazing
type: Opaque
stringData:
  DATABASE_PASSWORD: "${DB_PASSWORD}"
  MINIO_ACCESS_KEY: "${MINIO_USER}"
  MINIO_SECRET_KEY: "${MINIO_PASSWORD}"
  JWT_SECRET: "${JWT_SECRET}"
---
# PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: amazing
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: amazing-secrets
        env:
        - name: POSTGRES_DB
          value: "amazing"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: amazing-secrets
              key: DATABASE_PASSWORD
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pg-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: amazing
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
  clusterIP: None
---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: amazing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: amazing
spec:
  selector:
    app: redis
  ports:
  - port: 6379
---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: amazing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: gateway
        image: ${REGISTRY}/amazing-gateway:${VERSION}
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: amazing-config
        - secretRef:
            name: amazing-secrets
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: amazing
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: amazing-ingress
  namespace: amazing
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: amazing.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-svc
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
