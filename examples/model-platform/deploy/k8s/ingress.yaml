apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-platform-ingress
  namespace: model-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - model-platform.example.com
    secretName: model-platform-tls
  rules:
  - host: model-platform.example.com
    http:
      paths:
      # API 路由
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # MinIO Console
      - path: /minio
        pathType: Prefix
        backend:
          service:
            name: minio
            port:
              number: 9001
      # 前端路由（默认）
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
