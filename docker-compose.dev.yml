version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: amazing-postgres
    environment:
      POSTGRES_DB: amazing
      POSTGRES_USER: amazing
      POSTGRES_PASSWORD: amazing123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amazing"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amazing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: amazing-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: amazing
      MONGO_INITDB_ROOT_PASSWORD: amazing123

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
