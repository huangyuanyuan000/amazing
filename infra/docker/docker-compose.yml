version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: amazing
      POSTGRES_USER: amazing
      POSTGRES_PASSWORD: amazing123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  python-api:
    build:
      context: ./backend/python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://amazing:amazing123@postgres:5432/amazing
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/python:/app

  go-api:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://amazing:amazing123@postgres:5432/amazing
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - python-api
      - go-api

volumes:
  postgres_data:
  redis_data:
